version: '3.8'

services:
    nevo-postgres:
        image: postgres:16-alpine
        container_name: nevo-postgres
        restart: unless-stopped
        env_file:
            - .env
        network_mode: 'host'
        volumes:
            - ./data/postgres:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s

    # Optional: pgAdmin for database management
    nevo-pgadmin:
        image: dpage/pgadmin4:latest
        container_name: nevo-pgadmin
        restart: unless-stopped
        env_file:
            - .env
        network_mode: 'host'
        depends_on:
            nevo-postgres:
                condition: service_healthy
        volumes:
            - ./data/pgadmin:/var/lib/pgadmin
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'wget --no-verbose --tries=1 --spider http://localhost:5050/ || exit 1',
                ]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 90s
