# ============================================
# Nevo Test Drive - Development Environment
# ============================================
# Global vehicle booking system with timezone-aware scheduling
# Uses UTC-first architecture for global consistency

# ============================================
# Development Tools & Versions
# ============================================
# These tools are automatically installed and managed by mise
[tools]
node = "22.22.1"    # LTS Node.js version for React/NestJS development
yarn = "3.8.7"      # Package manager (faster than npm, supports monorepos)
"npm:nx" = "v21.6.10"  # Monorepo build tool for multiple apps

# ============================================
# Environment Variables
# ============================================
# Available to all tasks and automatically loaded
[env]
_.file = ".env"
_.path = "."
NX_PACKAGE_MANAGER = "yarn"        # Tell Nx to use Yarn

# ============================================
# Project Setup Tasks
# ============================================

[tasks.setup]
description = "Install dependencies and prepare environment"
run = "yarn install && yarn nx reset"

# ============================================
# Database Management Tasks
# ============================================
# All database operations use Prisma with UTC-first architecture

[tasks.db-setup]
description = "Complete database setup (push schema + seed data)"
depends = ["db-generate", "db-push", "db-seed"]  # Run in order: schema first, then data
run = "echo '✅ Database setup complete!'"

[tasks.db-push]
description = "Push Prisma schema to database (creates/updates tables)"
run = "npx prisma db push"

[tasks.db-seed]
description = "Seed database with sample vehicles and reservations"
run = "npx prisma db seed"

[tasks.db-reset]
description = "Reset database (force reset + reseed)"
depends = ["db-push", "db-seed"]  # Ensure clean state
run = "echo '🔄 Database reset complete!'"

[tasks.db-generate]
description = "Generate Prisma client for TypeScript types"
run = "npx prisma generate"

[tasks.db-studio]
description = "Open Prisma Studio (visual database browser)"
run = "npx prisma studio"

# ============================================
# Development Workflow Tasks
# ============================================
# Combined tasks for common development scenarios

[tasks.dev-setup]
description = "Complete development environment setup"
depends = ["setup", "db-setup"]  # Install deps → setup database
run = "echo '🚀 Development environment ready!'"

[tasks.full-reset]
description = "Complete project reset (database + dependencies)"
depends = ["db-reset"]  # Reset database first
run = "yarn nx reset && echo '🔄 Full project reset complete!'"

# ============================================
# Development Server Tasks
# ============================================

[tasks.dev]
description = "Start both API and web applications in development"
run = "nx run-many -t serve -p api web --port=${WEB_PORT:-3000}"

[tasks.api]
description = "Start API server only"
run = "nx serve api"

[tasks.web]
description = "Start web application only"
run = "nx serve web --port=${WEB_PORT:-3000}"

[tasks.build]
description = "Build all applications"
run = "nx build"

[tasks.test]
description = "Run all tests"
run = "nx test"

[tasks.lint]
description = "Run linting on all projects"
run = "nx lint"

# ============================================
# Usage Examples:
# ============================================
# New developer setup:     mise run dev-setup
# Daily development:       mise run db-reset
# Database browsing:       mise run db-studio
# Schema changes:          mise run db-push && mise run db-generate